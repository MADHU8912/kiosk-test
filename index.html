<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Office Kiosk Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    .msg {
      margin-top: 15px;
      text-align: center;
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Office Kiosk</h1>
    <input type="text" id="empid" placeholder="Employee ID">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    function login() {
      const empid = document.getElementById('empid').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');

      if (empid === "admin" && password === "1234") {
        msg.innerText = "Login Successful";
      } else {
        msg.innerText = "Invalid ID or Password";
      }
    }
  </script>
</body>
</html>
